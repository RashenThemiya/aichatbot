services:
  rag-service:
    build:
      context: ./rag-service
    container_name: rag-service
    env_file:
      - ./rag-service/.env
    environment:
      CHROMA_PERSIST_DIR: /app/chroma_data
    volumes:
      - rag_chroma_data:/app/chroma_data
      - backend_uploads:/app/uploads:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: rag-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      RAG_SERVICE_URL: http://rag-service:8000
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      - rag-service
    restart: unless-stopped

volumes:
  backend_uploads:
  rag_chroma_data:
